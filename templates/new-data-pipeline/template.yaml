apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: new-data-pipeline
  title: Create New Data Pipeline
  description: Scaffold a new Databricks data pipeline with catalog entry
  tags:
    - databricks
    - data-pipeline
    - edl
spec:
  owner: edl-governance
  type: data-pipeline
  parameters:
    - title: Pipeline Details
      required:
        - pipelineName
        - description
        - layer
      properties:
        pipelineName:
          title: Pipeline Name
          type: string
          description: Name of the data pipeline (lowercase, hyphens only)
          pattern: '^[a-z0-9-]+$'
          ui:placeholder: 'e.g. customer-ingestion'
        description:
          title: Description
          type: string
          description: What does this pipeline do?
          ui:placeholder: 'e.g. Ingests customer data from SAP'
        layer:
          title: Data Layer
          type: string
          enum:
            - bronze
            - silver-cleansed
            - silver-er
            - gold
          description: Which data layer does this pipeline belong to?
  steps:
    - id: fetch
      name: Fetch Template
      action: fetch:template
      input:
        url: ./skeleton
        values:
          pipelineName: ${{ parameters.pipelineName }}
          description: ${{ parameters.description }}
          layer: ${{ parameters.layer }}

    - id: log
      name: Log Output
      action: debug:log
      input:
        message: "Pipeline ${{ parameters.pipelineName }} created for ${{ parameters.layer }} layer"
        listWorkspace: true

  output:
    links:
      - title: Pipeline Created Successfully
        icon: catalog
        url: /catalog