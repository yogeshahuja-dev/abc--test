apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: data-product-rest-api
  title: Data Product REST API
  description: |
    REST API for accessing EDL data products from Gold layer.
    Serves: Early Payment Trends and other procurement data products.
  tags:
    - rest
    - data-product
    - procurement
spec:
  type: openapi
  lifecycle: production
  owner: edl-governance
  system: enterprise-data-lake
  definition: |
    openapi: 3.0.0
    info:
      title: EDL Data Product API
      version: 1.0.0
      description: API to access Enterprise Data Lake Gold layer data products
    servers:
      - url: https://adb-2478587080594690.10.azuredatabricks.net/api/2.0
    paths:
      /data-products:
        get:
          summary: List all available data products
          operationId: listDataProducts
          responses:
            '200':
              description: List of data products
              content:
                application/json:
                  schema:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          example: "dp-early-payment-trends"
                        name:
                          type: string
                          example: "Early Payment Trends"
                        domain:
                          type: string
                          example: "Procurement"
                        status:
                          type: string
                          enum: [active, deprecated, draft]
                        owner:
                          type: string
                          example: "edl-governance"
                        gold_tables:
                          type: array
                          items:
                            type: string
                          example: ["gold_procurement.po_overview", "gold_procurement.pr_overview"]
      /data-products/{id}:
        get:
          summary: Get data product details by ID
          operationId: getDataProduct
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: string
          responses:
            '200':
              description: Data product details
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      description:
                        type: string
                      schema:
                        type: object
                      sla:
                        type: string
                        example: "99.5% uptime"
                      refreshFrequency:
                        type: string
                        example: "Daily 8:00 AM IST"
                      lineage:
                        type: array
                        items:
                          type: string
                        example: ["bronze_sap_aem.t024_slt", "silver_sap_cleansed.t024_mstr", "silver.purchasing_group", "gold_procurement.po_overview"]
      /data-products/{id}/query:
        post:
          summary: Query a data product
          operationId: queryDataProduct
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: string
          requestBody:
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    sql:
                      type: string
                      example: "SELECT * FROM gold_procurement.po_overview LIMIT 10"
                    limit:
                      type: integer
                      default: 100
          responses:
            '200':
              description: Query results
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      columns:
                        type: array
                        items:
                          type: string
                      data:
                        type: array
                        items:
                          type: object
                      rowCount:
                        type: integer