  description: "Auto-discovered from Databricks Unity Catalog.\nFull name: adani_edl_governance_catalog_dev.silver.stock_in_hand\n\
    Layer: silver\nDescription: The table contains detailed inventory data related\
    \ to materials and their management across different plants and storage locations.\
    \ It includes unique identifiers for materials, plants, and clients, as well as\
    \ various stock quantities such as unrestricted, blocked, and stock in quality\
    \ inspection. This data can be used for inventory tracking, logistics planning,\
    \ and project allocation analysis. It is useful for understanding material availability,\
    \ managing stock transfers, and ensuring compliance with inventory regulations.\n\
    Columns (31):\n  - client_id (string) -- It is a three-char alphanumeric identifier\
    \ that represents a client in the SAP system. A client is the highest organizational\
    \ unit in SAP and serves as a self-contained unit with its own master data and\
    \ set of tables.\n  - material_number (string) -- Material Number is a identifier\
    \ assigned to each material item in the inventory, crucial for tracking and managing\
    \ inventory levels.\n⦁ Max length 18-character\n  - plant_code (string) -- A Plant\
    \ Code represents a specific physical or organizational location within a company\
    \ where materials are stored, produced, or managed Example: 2001 - APSEZ-MUNDRA-SEZ-OPS-W/O\
    \ LOP 2401 - AHPL-HAZIRA-PROJECTS\n  - storage_location (string) -- It is a key\
    \ organizational unit within a plant used to manage inventory at a more detailed\
    \ level. It is a 4-character field and is essential for tracking where materials\
    \ are physically or logically stored. \n⦁ 4-character (e.g., CS01, CS02).\n⦁ Identifies\
    \ the exact storage subset within a plant\n  - wbs_element (int) -- A WBS Element\
    \ (Work Breakdown Structure Element) is a specific task, activity, or cost‑collecting\
    \ area within a project. It represents a clearly defined part of the overall project\
    \ that needs to be planned, budgeted, executed, and monitored separately.\n  -\
    \ batch_number (string) -- Used to identify a specific quantity of material that\
    \ was produced or received under the same conditions. It is a key field in batch\
    \ management, allowing companies to track and manage inventory at a more granular\
    \ level. \n⦁ Max length 10-char\n⦁ Uniquely identifies a batch of material with\
    \ same manufacturing attributes.\n  - vendor_number (string) -- A Vendor number\
    \ is an identifier assigned to each vendor in the system. It represents the supplier\
    \ from whom a company purchases goods or services. This code is used throughout\
    \ the procurement and finance processes\n⦁ Maximum 10 character field\n  - sales_invoice_doc_number\
    \ (string) -- Number of the sales document (e.g., order, delivery). Useful for\
    \ linking vendor transactions to SD module.\n  - sales_document_item_number (string)\
    \ -- Number that uniquely identifies the item in the sales, shipping, or billing\
    \ document.\n  - quantity_for_rate (double) -- Represents the base stock quantity\
    \ used for rate calculation or valuation. Derived from unrestricted, project,\
    \ transfer, or consignment stock fields.\n  - Quantity (double) -- Total quantity\
    \ of the material available in stock.\n  - Unrestricted_Stock (double) -- It represents\
    \ the quantity of stock available for use and valuated in inventory accounting.\n\
    \ ⦁ Represents physically available stock not subject to quality inspection, blocking,\
    \ or reservations.\n  - Stock_In_Quality_Inspection (double) -- It indicates stock\
    \ under Quality inspection and not yet available for unrestricted or end use.\n\
    \  - Blocked_Stock (double) -- It represents stock that is blocked and cannot\
    \ be used until released.\n  - Stock_in_Transfer (double) -- Stock in transfer\
    \ (from one storage location to another). It tracks stock currently being moved\
    \ between storage locations.\n  - Restricted_Quantity (double) -- Stock that is\
    \ subject to restrictions, either for internal use or specific customer requirements.\n\
    \  - Transit_Transfer_Stock (string) -- Inventory in the process of being physically\
    \ moved between locations or plants.\n  - UniqueKey (string) -- Composite key\
    \ combining client, material, plant, and storage location. Ensures uniqueness\
    \ of inventory records across sources.\n  - MainKey (string) -- Key combining\
    \ client, material, and plant. Used to group inventory records at plant level\
    \ regardless of storage location.\n  - Type_1 (string) -- Classification of inventory\
    \ into Operations and Maintainance Stock or Project Stock\n  ... +11 more\nDiscovered:\
    \ 2026-04-30 12:32"
