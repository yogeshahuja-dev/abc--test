  description: "Auto-discovered from Databricks Unity Catalog.\nFull name: adani_edl_governance_catalog_dev.silver.plant\n\
    Layer: silver\nDescription: The table contains information related to plants within\
    \ the SAP system, including identifiers for clients and plants, as well as details\
    \ for inventory valuation and vendor differentiation. It can be used for logistics\
    \ and inventory management, tracking plant operations, and analyzing vendor relationships.\
    \ The table also includes fields for managing historical data and versioning,\
    \ which can be useful for auditing and compliance purposes.\nColumns (10):\n \
    \ - client_id (string) -- It is a three-char alphanumeric identifier that represents\
    \ a client in the SAP system. A client is the highest organizational unit in SAP\
    \ and serves as a self-contained unit with its own master data and set of tables.\n\
    \  - plant_code (string) -- A Plant Code represents a specific physical or organizational\
    \ location within a company where materials are stored, produced, or managed Example:\
    \ 2001 - APSEZ-MUNDRA-SEZ-OPS-W/O LOP 2401 - AHPL-HAZIRA-PROJECTS\n  - plant_name\
    \ (string) -- Primary name of the plant. Displayed in reports and transaction\
    \ screens for identification and operational clarity.\n⦁ Free-text description.\n\
    ⦁ Human-readable plant name displayed \n⦁ Max length 30 char\n  - plant_supp_name\
    \ (string) -- Supplementary name field for extended plant description. Useful\
    \ when plant_name is insufficient for full identification.\n  - valuation_area\
    \ (string) -- Key for valuation area linked to the plant. Determines inventory\
    \ valuation method and supports cost accounting. \n⦁ Max length 4 char\n  - identifier\
    \ (string) -- Custom discriminator to differentiate vendors across multiple SAP\
    \ instances when client code alone is insufficient.\n  - HASH_KEY (string) --\
    \ System-generated hash key used for uniquely identifying records and ensuring\
    \ data integrity.\n  - SYS_EFFECTIVE_START_DATE (date) -- System Effective Start\
    \ Date, indicating when the record became valid in the system.\n  - SYS_EFFECTIVE_END_DATE\
    \ (date) -- System Effective End Date, indicating when the record ceased to be\
    \ valid in the system.\n  - IS_ACTIVE (string) -- Flag indicating whether the\
    \ record is currently active. Y indicates an active record which means that it\
    \ is the latest record N indicates an in-active record which means that this record\
    \ is old and has been changed\nDiscovered: 2026-04-30 12:31"
