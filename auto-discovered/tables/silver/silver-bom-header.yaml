  description: "Auto-discovered from Databricks Unity Catalog.\nFull name: adani_edl_governance_catalog_dev.silver.bom_header\n\
    Layer: silver\nColumns (17):\n  - client_id (string) -- It is a three-char alphanumeric\
    \ identifier that represents a client in the SAP system. A client is the highest\
    \ organizational unit in SAP and serves as a self-contained unit with its own\
    \ master data and set of tables.\n  - bom_category (string) -- This key defines\
    \ a Bill of Materials (BOM) based on the type of object it is linked to, such\
    \ as a material, equipment, functional location, or document. Common Values: D\
    \ indicates Document Structure, E indicates Equipment BOM, K indicates Order BOM,\
    \ M indicates Material BOM, S indicates Standard BOM, T indicates Functional Location\
    \ BOM, P indicates Work Breakdown Structure BOM\n  - bom_id (string) -- A Bill\
    \ of Materials (BOM) is a structured list of all components, materials, assemblies,\
    \ subassemblies, and quantities required to manufacture, maintain, or repair a\
    \ product or equipment. It serves as the blueprint for production by specifying\
    \ what is needed and how items relate to each other.\n  - alternative_bom (string)\
    \ -- Alternative BOM is used to identify one specific version of a bill of materials\
    \ within a group of possible options for the same product or assembly. It allows\
    \ different material structures to be maintained for scenarios such as varying\
    \ production methods, lot sizes, or manufacturing requirements, while keeping\
    \ them logically grouped together.\n  - counter (bigint) -- This field represents\
    \ an internal number used to uniquely identify an individual activity posting.\n\
    \  - valid_from (date) -- Specifies the start date for the validity period of\
    \ a BOM id\n  - base_unit_of_measure (string) -- Base unit of measure defines\
    \ how quantities of a material are measured and managed in the system. Max 3-character.\
    \ Stored in ISO UOM format (ea, kg, l, m, etc.). EA - each/unit/single piece,\
    \ KG - kilogram, G - gram\n  - base_quantity (double) -- This field represents\
    \ the standard quantity of a product or assembly for which the bill of materials\
    \ is defined. All component quantities are calculated in relation to this base\
    \ quantity.\n  - bom_status (bigint) -- It indicates the current stage or readiness\
    \ of a bill of materials. It controls how the bill of materials can be used across\
    \ different business activities, such as engineering changes, cost calculations,\
    \ and planning processes.\n  - plant_code (string) -- A Plant Code represents\
    \ a specific physical or organizational location within a company where materials\
    \ are stored, produced, or managed. Example: 2001 - APSEZ-MUNDRA-SEZ-OPS-W/O LOP,\
    \ 2401 - AHPL-HAZIRA-PROJECTS\n  - created_on (date) -- It represents the date\
    \ on which the BOM was created\n  - created_by (string) -- It represents the user\
    \ who created the BOM\n  - identifier (string) -- Custom discriminator to differentiate\
    \ vendors across multiple SAP instances when client code alone is insufficient.\n\
    \  - hash_key (string) -- System-generated hash key used for uniquely identifying\
    \ records and ensuring data integrity.\n  - is_active (string) -- Flag indicating\
    \ whether the record is currently active. Y indicates an active record which means\
    \ that it is the latest record. N indicates an in-active record which means that\
    \ this record is old and has been changed.\n  - sys_effective_start_date (date)\
    \ -- System Effective Start Date, indicating when the record became valid in the\
    \ system.\n  - sys_effective_end_date (date) -- System Effective End Date, indicating\
    \ when the record ceased to be valid in the system.\nDiscovered: 2026-04-30 12:30"
