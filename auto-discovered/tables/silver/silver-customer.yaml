  description: "Auto-discovered from Databricks Unity Catalog.\nFull name: adani_edl_governance_catalog_dev.silver.customer\n\
    Layer: silver\nColumns (27):\n  - client_id (string) -- It is a three-char alphanumeric\
    \ identifier that represents a client in the SAP system. A client is the highest\
    \ organizational unit in SAP and serves as a self-contained unit with its own\
    \ master data and set of tables.\n  - customer_number (string) -- Customer number,\
    \ an identifier assigned to each customer. It is a character-type (CHAR) field.\
    \ This field is essential for linking customer data across various domains, such\
    \ as sales, distribution, customer relationship\n• Maximum 10 char field\n  -\
    \ country_key (string) -- It is used to identify the country associated with a\
    \ customer in the system. The value of country key is typically based on ISO country\
    \ codes\n• Common Value IN for India\n  - customer_name (string) -- Customer_name\
    \ is a field used to store the primary name of a Customer. It typically contains\
    \ the company name or the individual name, depending on the type of Customer.\n\
    • Alphanumeric including spaces max length 35.\n  - customer_extended_name (string)\
    \ -- customer_extended_name is a supplementary name field used to store a second\
    \ line of the name. This is often used when the full name of a company, organization,\
    \ or individual does not fit into the primary customer name field.\n• Optional\
    \ field.\n• Alphanumeric max length 35.\n• Used when customer name exceeds line\
    \ 1 capacity.\n  - city (string) -- Specifies the city where the customer is located.\
    \ It is part of the customer address and is used in correspondence, shipping,\
    \ and tax determination. Accurate city data ensures proper logistics and legal\
    \ compliance. It also supports regional reporting and analysis.\n  - region (string)\
    \ -- Region code indicating the geographic area associated with the transaction,\
    \ essential for regional spend analysis and compliance. Max 3-character code (e.g.,\
    \ 09 - Jammu and Kashmir, 19 Punjab).\n  - one_time_account_indicator (string)\
    \ -- One-time account indicator. When set, customer is treated as one-time with\
    \ address, bank details etc are captured per document.\n  - address_id (string)\
    \ -- A reference number used to connect a record to its stored address details.\
    \ It helps the system find and manage the correct address information for a record\
    \ easily.\n  - creation_date (date) -- Date the customer master record was created.\
    \ Useful for audit and lifecycle analytics.\n  - central_billing_block (string)\
    \ -- Indicates whether billing activities are blocked for a customer across the\
    \ organization. When set, billing documents such as invoices or credits cannot\
    \ be processed until the block is removed.\n  - customer_account_group (string)\
    \ -- Vendor group code is a 4-character code that classifies vendors into groups\n\
    Examples:\nZGOV Indicates Government and Statutory\nCONE indicates One time Customer\n\
    \  - central_delivery_block (string) -- Indicates whether delivery activities\
    \ are blocked for a customer across all the sales areas. When active, shipments\
    \ and deliveries cannot be processed until the block is removed.\nExamples:\n\
    Z1 indicates Duplicate Block\nZ2 indicates CIN Block\nZ3 indicates GST Block\n\
    Z4 indicates Blacklisting Block\nZ5 indicates PAN-Aadhaar Block\n  - deletion_indicator\
    \ (string) -- Deletion indicator marking bank key flagged for removal. This does\
    \ not physically remove the item from the database but flags it.\nCommon Values:\n\
    X indicates Marked for deletion\nBlank indicates Active\n  - customer_posting_block_flag\
    \ (string) -- It is a field used to indicate a posting block for a customer for\
    \ all company codes. It prevents financial transactions such as invoice postings\
    \ or payments for that particular customer for all company codes.\nCommon Values:\
    \ X = Customer centrally blocked; blank = Active\n  - trading_partner_code (string)\
    \ -- It is a standard field used to identify the trading partner (intercompany\
    \ business entities). It represents the company code of the affiliated entity\
    \ involved in the transaction, enabling accurate tracking and reporting of intercompany\
    \ activities.\n• Max length 6-character alphanumeric.\n• Used for intercompany\
    \ elimination & consolidation\n  - customer_payment_block (string) -- It is a\
    \ Payment Block indicator used in customer master records to prevent the customer\
    \ from being paid.\nCommon Values: X = Blocked for Payments. Blank = Active.\n\
    \  - tax_number_3 (string) -- It stores the tax identification number for the\
    \ business partner generally GST number\n• It is alphanumeric\n• Must match GSTIN\
    \ structure.\n• Sensitive commercial information.\n  - pan_number (string) --\
    \ The Permanent Account Number of the customer, critical for tax reporting and\
    \ compliance with financial regulations\n• Critical field.\n• Always 10-character\
    \ alphanumeric (e.g., ABCDE1234F).\n• Sensitive personal/commercial information\n\
    \  - account_group_description (string) -- Contains the textual description of\
    \ the customer account group. It helps identify the purpose or classification\
    \ of customer master records.\n  ... +7 more\nDiscovered: 2026-04-30 12:30"
