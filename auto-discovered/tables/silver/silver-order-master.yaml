  description: "Auto-discovered from Databricks Unity Catalog.\nFull name: adani_edl_governance_catalog_dev.silver.order_master\n\
    Layer: silver\nDescription: The table contains data related to various orders\
    \ processed within the system. It includes details such as the order description,\
    \ associated client, internal order identifiers, and financial metrics like currency\
    \ and profit center. Use cases for this data include tracking order lifecycle\
    \ events, analyzing order quantities, and examining order performance across different\
    \ company codes and business areas.\nColumns (59):\n  - client_id (string) --\
    \ It is a three-char alphanumeric identifier that represents a client in the SAP\
    \ system. A client is the highest organizational unit in SAP and serves as a self-contained\
    \ unit with its own master data and set of tables.\n  - internal_order_number\
    \ (string) -- An Internal Order is used to plan, collect, and monitor costs for\
    \ specific activities, projects, or tasks within an organization. It acts as a\
    \ temporary cost collector that can later be settled to cost centers, assets,\
    \ or other receivers\n  - company_code (string) -- The company code representing\
    \ the smallest organizational unit for which a complete, self-contained set of\
    \ accounts can be drawn up, crucial for legal and financial reporting. Max 4 characters.\
    \ Common values: 1000, 2000\n  - controlling_area (string) -- Defines the highest\
    \ organizational unit in Controlling (CO) and groups company codes for cost accounting\
    \ purposes. Examples: 1000- Adani Infrastructure Grp\n  - created_by (string)\
    \ -- User name of the person who created the internal order.\n  - created_on (date)\
    \ -- Date on which the internal order was created.\n  - order_desc (string) --\
    \ Short, language-independent text used to briefly identify or summarize an order.\n\
    \  - plant_code (string) -- A Plant Code represents a specific physical or organizational\
    \ location within a company where materials are stored, produced, or managed.\
    \ Example: 2001 - APSEZ-MUNDRA-SEZ-OPS-W/O LOP, 2401 - AHPL-HAZIRA-PROJECTS\n\
    \  - business_area (string) -- Internal organizational unit used to represent\
    \ a specific area of operations or responsibility within a company, enabling internal\
    \ financial reporting by segmenting data across different business areas.\n  -\
    \ profit_centre (string) -- A Profit Centre is an internal organizational unit\
    \ used to measure the financial performance of a specific area of the business.\
    \ Examples: 2101050 - APSEZ-MARINE-HPCL, 1UPNDG0799 - H R DEPT, 1UPNDG0299 - BILLING\
    \ DEPT\n  - internal_order_type (string) -- Key that differentiates internal orders\
    \ according to their purpose. Examples: PM10 - General Maintenance, PM20 - Preventive\
    \ Maintenance, PM30 - Calibration, PM40 - Audit, PM50 - Refurbishment\n  - internal_order_category\
    \ (bigint) -- Order Category defines the fundamental characteristics and behavior\
    \ of an internal order. Determines how an order is processed, controlled, and\
    \ handled throughout its lifecycle.\n  - internal_order_object_id (string) --\
    \ Technical identifier assigned to an Internal order in SAP.\n  - currency_key\
    \ (string) -- Currency key, crucial for multi-currency operations and financial\
    \ reporting. Always 3-character ISO codes (eg. INR, USD, EUR). Alphabetic only.\n\
    \  - creation_indicator (string) -- Shows that an internal order has been created\
    \ and is currently in its initial phase.\n  - release_indicator (string) -- Indicates\
    \ that an internal order has moved into its second phase, where it is approved\
    \ and ready for execution.\n  - completion_indicator (string) -- Indicates that\
    \ an internal order has reached the third phase, where all work has been finished\
    \ and the internal order is technically complete.\n  - closure_indicator (string)\
    \ -- Indicates that an internal order has reached its final phase, where all required\
    \ work, reviews, and follow-up activities are fully completed.\n  - deletion_indicator\
    \ (string) -- Indicates that an internal order is marked for deletion and is no\
    \ longer active. Once flagged, the order cannot be changed or used for any new\
    \ postings, but its historical information remains available for reference.\n\
    \  - cost_centre (string) -- Cost center code for financial tracking and resource\
    \ allocation within a controlling area that represents a defined location of cost\
    \ incurrence.\n  ... +39 more\nDiscovered: 2026-04-30 12:31"
