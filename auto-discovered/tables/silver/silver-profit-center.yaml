  description: "Auto-discovered from Databricks Unity Catalog.\nFull name: adani_edl_governance_catalog_dev.silver.profit_center\n\
    Layer: silver\nColumns (16):\n  - client_id (string) -- It is a three-char alphanumeric\
    \ identifier that represents a client in the SAP system. A client is the highest\
    \ organizational unit in SAP and serves as a self-contained unit with its own\
    \ master data and set of tables.\n  - profit_center (string) -- A Profit Centre\
    \ is an internal organizational unit used to measure the financial performance\
    \ of a specific area of the business. It allows a company to track revenues, costs,\
    \ and profitability for a defined segment. Examples: 2101050 - APSEZ-MARINE-HPCL\
    \ 1UPNDG0799 - H R DEPT 1UPNDG0299 - BILLING DEPT\n  - valid_to_date (date) --\
    \ This is the final date until which the profit centre will remain valid — basically\
    \ the “end date” of the record.\n  - controlling_area (string) -- It defines the\
    \ highest organizational unit in Controlling (CO) and groups company codes for\
    \ cost accounting purposes. Examples: 1000- Adani Infrastructure Grp\n  - identifier\
    \ (string) -- Custom discriminator to differentiate vendors across multiple SAP\
    \ instances when client code alone is insufficient.\n  - profit_centre_area (string)\
    \ -- It identifies the broader grouping or category to which a specific profit‑related\
    \ unit belongs. It helps classify that unit under a common area so it can be viewed\
    \ or analyzed together with similar units.\n  - company_code (string) -- The company\
    \ code represents the smallest organizational unit for which a complete, self-contained\
    \ set of accounts can be drawn up, crucial for legal and financial reporting ⦁\
    \ Max 4 characters ⦁ Common values: 1000, 2000\n  - profit_center_short_text (string)\
    \ -- Stores the short name of the profit center, like a brief label describing\
    \ the profit centre.\n  - profit_center_long_text (string) -- Contains the long,\
    \ detailed description of the profit center for clearer understanding.\n  - created_by\
    \ (string) -- User ID of the person who created the profit cemtre. It is important\
    \ for accountability and auditing.\n  - creation_date (date) -- This field stores\
    \ the date on which the profit center master record was originally created.\n\
    \  - lock_indicator (string) -- It is used to control whether the profit center\
    \ is active, locked,for postings. Examples: -X indicates that the Profit centre\
    \ is locked. -Blank indicates that it is Unlocked\n  - sys_effective_start_date\
    \ (date) -- System Effective Start Date, indicating when the record became valid\
    \ in the system.\n  - sys_effective_end_date (date) -- System Effective End Date,\
    \ indicating when the record ceased to be valid in the system.\n  - is_active\
    \ (string) -- Flag indicating whether the record is currently active. Y indicates\
    \ an active record which means that it is the latest record N indicates an in-active\
    \ record which means that this record is old and has been changed\n  - hash_key\
    \ (string) -- System-generated hash key used for uniquely identifying records\
    \ and ensuring data integrity.\nDiscovered: 2026-04-30 12:32"
