    \ -- Indicates whether the flow relates to outgoing, incoming, or both sides of\
    \ the transaction. Values: 0 = Incoming and outgoing, 1 = Outgoing, 2 = Incoming.\n\
    \  - condition (bigint) -- Represents a specific rule or condition applied to\
