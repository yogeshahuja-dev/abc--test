  description: "Auto-discovered from Databricks Unity Catalog.\nFull name: adani_edl_governance_catalog_dev.silver.internal_order_master\n\
    Layer: silver\nColumns (35):\n  - client_id (string) -- It is a three-char alphanumeric\
    \ identifier that represents a client in the SAP system. A client is the highest\
    \ organizational unit in SAP and serves as a self-contained unit with its own\
    \ master data and set of tables.\n  - internal_order_number (string) -- An Internal\
    \ Order is used to plan, collect, and monitor costs for specific activities, projects,\
    \ or tasks within an organization. It acts as a temporary cost collector that\
    \ can later be settled to cost centers, assets, or other receivers\n  - identifier\
    \ (string) -- Custom discriminator to differentiate vendors across multiple SAP\
    \ instances when client code alone is insufficient.\n  - controlling_area (string)\
    \ -- It defines the highest organizational unit in Controlling (CO) and groups\
    \ company codes for cost accounting purposes. Examples: 1000- Adani Infrastructure\
    \ Grp\n  - cost_centre_short_text (string) -- Stores the short name of the cost\
    \ center, like a brief label describing the department.\n  - plant (string) --\
    \ A Plant Code represents a specific physical or organizational location within\
    \ a company where materials are stored, produced, or managed Example: 2001 - APSEZ-MUNDRA-SEZ-OPS-W/O\
    \ LOP 2401 - AHPL-HAZIRA-PROJECTS\n  - company_code (string) -- The company code\
    \ represents the smallest organizational unit for which a complete, self-contained\
    \ set of accounts can be drawn up, crucial for legal and financial reporting.\
    \  ⦁ Max 4 characters Common Values : 1000, 2000\n  - profit_center (string) --\
    \ A Profit Centre is an internal organizational unit used to measure the financial\
    \ performance of a specific area of the business. It allows a company to track\
    \ revenues, costs, and profitability for a defined segment Examples: 2101050 -\
    \ APSEZ-MARINE-HPCL 1UPNDG0799 - H R DEPT 1UPNDG0299 - BILLING DEPT\n  - object_number\
    \ (string) -- Object number that uniquely identifies an order in CO (controlling)\
    \ and links to many controlling tables.\n  - order_type (string) -- Order type\
    \ categorizies order as per their business purpose -PM01 indicates Breakdown Maintenance,\
    \ PM03 indicates Preventative Maintainence\n  - order_category (bigint) -- It\
    \ indicates the type order that helps the system understand how that item should\
    \ be handled and linked to other related information.  Eg. 01 indicates internal\
    \ order, 10 indicates Production order\n  - created_by (string) -- It represents\
    \ the name of the person who originally created the record. It helps identify\
    \ who entered the information into the system for the first time.\n  - creation_date\
    \ (date) -- It represents the date on which the record was first created. It helps\
    \ identify when the information was initially entered into the system.\n  - deletion_indicator\
    \ (string) -- Deletion indicator marking Purchase Order flagged for removal. This\
    \ does not physically remove the Purchase order from the database but flags it.\
    \ Blank - Active L - Deleted. S - Deleted\n  - reservation_number (string) --\
    \ Alphanumeric key uniquely identifying document. Reservation number for components\
    \ required for the production order.\n  - bom_category (string) -- This key defines\
    \ Bill of Material according to the object (material/equipment) it is linked to\
    \ eg:1. M indicates Material BOM 2. E indicates Equipment BOM\n  - bom_status\
    \ (bigint) -- BOM status determining whether the BOM is active, inactive. 01 indicates\
    \ active, 02 indicates inactive\n  - bom_number (string) -- BOM Number is used\
    \ along with BOM category to uniquely identify the production order.\n  - base_quantity\
    \ (double) -- Base quantity expected during manufacturing; can be used as threshold\
    \ when it hits BOM can be triggered\n  - base_unit_of_measure (string) -- Base\
    \ Unit of measure in which stocks of material are managed. Eg.  \" indicates Inch,\
    \ % indicates percentage\n  ... +15 more\nDiscovered: 2026-04-30 12:31"
