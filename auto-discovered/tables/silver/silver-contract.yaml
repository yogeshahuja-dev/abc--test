  description: "Auto-discovered from Databricks Unity Catalog.\nFull name: adani_edl_governance_catalog_dev.silver.contract\n\
    Layer: silver\nDescription: Contracts represent long term purchasing agreements\
    \ that define the materials or services an organization plans to procure from\
    \ a supplier over a specified period. They outline the commercial terms and committed\
    \ quantities or values but do not specify the exact delivery dates. Contract items\
    \ are drawn upon as needed through subsequent purchase releases.\nColumns (40):\n\
    \  - client_id (string) -- It is a three-char alphanumeric identifier that represents\
    \ a client in the SAP system. A client is the highest organizational unit in SAP\
    \ and serves as a self-contained unit with its own master data and set of tables.\n\
    \  - contract_number (string) -- It represents the number assigned to a contract,\
    \ used to identify and track that specific purchasing agreement. Maximum 10-character\
    \ field.\n  - contract_item_number (bigint) -- It represents the line‑item number\
    \ within a contract, identifying each material or service defined under the contract.\
    \ Numeric field up to 5 characters.\n  - vendor_number (string) -- A Vendor number\
    \ is an identifier assigned to each vendor in the system. It represents the supplier\
    \ from whom a company purchases goods or services. This code is used throughout\
    \ the procurement and finance processes. Maximum 10-character field.\n  - creation_date\
    \ (date) -- This field stores the date when the contract is created. Stored in\
    \ date format (YYYYMMDD). Must be a valid calendar date.\n  - document_type (string)\
    \ -- Document type indicating nature of Contract. Examples: MK = Quantity Contract;\
    \ RK = Rate Contract.\n  - document_category (string) -- Categorizing the nature\
    \ of the purchase document, such as standard PO, returns, or consignment to ensure\
    \ that each document is treated according to its business purpose. Categories:\
    \ A = Request for Quotation; F = Purchase Order; K = Contract; L = Scheduling\
    \ Agreement.\n  - company_code (string) -- The company code represents the smallest\
    \ organizational unit for which a complete, self-contained set of accounts can\
    \ be drawn up, crucial for legal and financial reporting. Max 4 characters. Common\
    \ values: 1000, 2000.\n  - buyer_name_id (string) -- User who created the contract.\
    \ Useful for accountability and workflow tracking.\n  - release_indicator (string)\
    \ -- Release indicator indicating approval status of the contract. Common values:\
    \ 1 - Not released; A, R - Released/approved.\n  - validity_start_date (date)\
    \ -- Validity start date of the contract. Marks commencement of the validity period\
    \ in the contract.\n  - validity_end_date (date) -- Validity end date of the contract.\
    \ Indicates expiration of the validity period in the contract.\n  - currency_key\
    \ (string) -- Currency key, crucial for multi-currency operations and financial\
    \ reporting. Always 3-character ISO codes (e.g., INR, USD, EUR). Alphabetic only.\n\
    \  - exchange_rate (double) -- Exchange rate applicable to the transaction, facilitating\
    \ accurate conversion and financial analysis.\n  - payment_term_desc (string)\
    \ -- The Payment Term Description provides the textual explanation of the payment\
    \ terms assigned to a contract.\n  - cash_discount_days (double) -- Additional\
    \ payment term days to baseline date. Used for flexible payment arrangements.\n\
    \  - payment_term (string) -- Payment Terms specify the agreed rules for when\
    \ an invoice becomes due for payment and whether any early‑payment discounts apply.\
    \ Examples: A027 - Net due in 75 days from invoice date; Z005 - 2% within 7 Days/1%\
    \ within 30 Days.\n  - release_status (string) -- This field indicates the Release\
    \ Status of the contract. When release status = X, it means the release strategy\
    \ has been fully executed—i.e., the contract has been completely released. When\
    \ release status is blank, it means the contract is not yet released or is still\
    \ in the process of being approved.\n  - purchase_group_code (string) -- It is\
    \ a key organizational unit that represents the buyer or group of buyers responsible\
    \ for specific purchasing activities. It is used to assign responsibility for\
    \ procurement tasks and to route purchasing documents accordingly. 3-character\
    \ identifier. Examples: 106 - Spare & Consm-HO; 110 - Custom-Logstc-HO.\n  - document_date\
    \ (date) -- It is the Contract date. Stored in YYYYMMDD format. Must be a valid\
    \ date.\n  ... +20 more\nDiscovered: 2026-04-30 12:30"
