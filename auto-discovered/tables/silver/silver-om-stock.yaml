  title: silver.om_stock
  description: "Auto-discovered from Databricks Unity Catalog.\nFull name: adani_edl_governance_catalog_dev.silver.om_stock\n\
    Layer: silver\nDescription: The table contains data related to inventory management\
    \ within the SAP system. It includes details about clients, plants, materials,\
    \ and stock levels. Use cases for this table include tracking material availability,\
    \ managing inventory across different storage locations, and analyzing stock movements\
    \ over time. The table also supports versioning and historical tracking of records,\
    \ which can be useful for auditing and compliance purposes.\nColumns (13):\n \
    \ - client_id (string) -- It is a three-char alphanumeric identifier that represents\
    \ a client in the SAP system. A client is the highest organizational unit in SAP\
    \ and serves as a self-contained unit with its own master data and set of tables.\n\
    \  - plant_code (string) -- A Plant Code represents a specific physical or organizational\
    \ location within a company where materials are stored, produced, or managed Example:\
    \ \n2001 - APSEZ-MUNDRA-SEZ-OPS-W/O LOP 2401 - AHPL-HAZIRA-PROJECTS\n  - material_number\
    \ (string) -- Material Number is a identifier assigned to each material item in\
    \ the inventory, crucial for tracking and managing inventory levels.\n ⦁ Max length\
    \ 18-character\n  - storage_location (string) -- It is a key organizational unit\
    \ within a plant used to manage inventory at a more detailed level. It is a 4-character\
    \ field and is essential for tracking where materials are physically or logically\
    \ stored.\n⦁ 4-character (e.g., CS01, CS02). \n⦁ Identifies the exact storage\
    \ subset within a plant\n  - unrestricted_stock (double) -- It represents the\
    \ quantity of stock available for use and valuated in inventory accounting. \n\
    ⦁Represents physically available stock not subject to quality inspection, blocking,\
    \ or reservations.\n  - stock_in_transfer (double) -- Stock in transfer (from\
    \ one storage location to another). It tracks stock currently being moved between\
    \ storage locations.\n  - stock_in_quality_inspection (double) -- It indicates\
    \ stock under Quality inspection and not yet available for unrestricted or end\
    \ use.\n  - blocked_stock (double) -- It represents stock that is blocked and\
    \ cannot be used until released.\n  - identifier (string) -- Custom discriminator\
    \ to differentiate vendors across multiple SAP instances when client code alone\
    \ is insufficient.\n  - HASH_KEY (string) -- System-generated hash key used for\
    \ uniquely identifying records and ensuring data integrity.\n  - SYS_EFFECTIVE_START_DATE\
    \ (date) -- System Effective Start Date, indicating when the record became valid\
    \ in the system.\n  - SYS_EFFECTIVE_END_DATE (date) -- System Effective End Date,\
    \ indicating when the record ceased to be valid in the system.\n  - IS_ACTIVE\
    \ (string) -- Flag indicating whether the record is currently active. Y indicates\
    \ an active record which means that it is the latest record N indicates an in-active\
    \ record which means that this record is old and has been changed\nDiscovered:\
    \ 2026-04-30 12:31"
