    \ a purchase order for granular tracking of materials, quantities, prices, and\
    \ delivery schedules.\n  - PURCHASE_REQ_NUMBER (string) -- Purchase requisition\
    \ number linked to the PO item. Enables traceability from requisition to order.\n\
    \  - PURCHASE_REQ_ITEM_NUMBER (string) -- Purchase requisition item number. Specifies\
    \ individual line items within the requisition.\n  - EMERGENCY_PO (string) --\
    \ Classifies a Purchase Order (PO) as Emergency or Normal based on its document\
    \ type.\nDiscovered: 2026-04-30 12:33"
