  description: "Auto-discovered from Databricks Unity Catalog.\nFull name: adani_edl_governance_catalog_dev.gold_procurement.post_facto_po\n\
    Layer: gold\nDescription: The Post_Facto_PO_Table identifies POs created post-factum\
    \ by comparing PO dates with vendor invoice dates. It enables: Compliance Monitoring:\
    \ Detecting violations of procurement policies. Process Analysis: Understanding\
    \ delays in PO creation and approval workflows. Risk Management: Highlighting\
    \ areas prone to financial or operational discrepancies. This dataset is essential\
    \ for spend analytics, audit readiness, and policy enforcement. Grain: One row\
    \ per PO identified as post-facto.\nColumns (3):\n  - CLIENT_ID (string) -- It\
    \ is a three-digit identifier that represents a client in the SAP system. A client\
    \ is the highest organizational unit in SAP and serves as a self-contained unit\
    \ with its own master data and set of tables.\n  - PURCHASE_ORDER_NUMBER (string)\
    \ -- Unique purchase order number assigned by SAP. Serves as the primary key for\
    \ procurement transactions and links header and item details for procurement transactions.\n\
    \  - POST_FACTO (string) -- Flags whether a Purchase Order (PO) was created after\
    \ the receipt of an invoice. If the PO creation date is later than the invoice\
    \ receipt date, the PO is classified as Post-Facto; otherwise, it is classified\
    \ as Normal.\nDiscovered: 2026-04-30 12:33"
